---
layout: default
---

<article class="servizio-dettaglio">
  <h1>{{ page.title }}</h1>
  <p>{{ page.description }}</p>
  <div class="gallery">
    {% for foto in page.gallery %}
      <img src="{{ foto }}" alt="{{ page.title }} foto" class="gallery-img"/>
    {% endfor %}
  </div>
  <div class="servizio-content">
    {{ content }}
  </div>
</article>
